<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="로보그램 코딩교육 QR 전자출석 시스템">
    <meta name="keywords" content="로보그램, QR출석, 전자출석, 코딩교육">
    
    <!-- PWA 매니페스트 -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- iOS 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR출석">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    
    <!-- 파비콘 -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/favicon-16x16.png">
    
    <title>로보그램 QR 전자출석</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #streamlit-container {
            flex: 1;
            width: 100%;
            border: none;
            overflow: hidden;
        }
        
        /* 로딩 화면 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .loading-text {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .loading-subtext {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        /* 스피너 */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 설치 프롬프트 */
        #install-prompt {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        #install-prompt.show {
            display: block;
        }
        
        .install-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .install-icon {
            font-size: 40px;
        }
        
        .install-text {
            flex: 1;
        }
        
        .install-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .install-desc {
            font-size: 13px;
            color: #666;
        }
        
        .install-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .install-button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .install-button.primary {
            background: #4CAF50;
            color: white;
        }
        
        .install-button.secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .install-button:active {
            transform: scale(0.95);
        }
        
        /* 오프라인 표시 */
        #offline-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #ff9800;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9998;
            display: none;
        }
        
        #offline-indicator.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 로딩 화면 -->
    <div id="loading">
        <div class="logo">📱</div>
        <div class="loading-text">로보그램 QR출석</div>
        <div class="loading-subtext">잠시만 기다려주세요...</div>
        <div class="spinner"></div>
    </div>
    
    <!-- 오프라인 표시 -->
    <div id="offline-indicator">
        📡 오프라인 모드 - 인터넷 연결을 확인해주세요
    </div>
    
    <!-- Streamlit 앱 컨테이너 -->
    <iframe id="streamlit-container" src="http://localhost:8501" allowfullscreen></iframe>
    
    <!-- 앱 설치 프롬프트 -->
    <div id="install-prompt">
        <div class="install-content">
            <div class="install-icon">📱</div>
            <div class="install-text">
                <div class="install-title">앱으로 설치하기</div>
                <div class="install-desc">홈 화면에 추가하여 앱처럼 사용하세요</div>
            </div>
        </div>
        <div class="install-buttons">
            <button class="install-button primary" id="install-btn">설치</button>
            <button class="install-button secondary" id="dismiss-btn">나중에</button>
        </div>
    </div>
    
    <script>
        let deferredPrompt;
        
        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
        
        // 로딩 화면 제거
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        });
        
        // PWA 설치 프롬프트
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // 3초 후 설치 프롬프트 표시
            setTimeout(() => {
                document.getElementById('install-prompt').classList.add('show');
            }, 3000);
        });
        
        // 설치 버튼 클릭
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response: ${outcome}`);
                deferredPrompt = null;
                document.getElementById('install-prompt').classList.remove('show');
            }
        });
        
        // 나중에 버튼 클릭
        document.getElementById('dismiss-btn').addEventListener('click', () => {
            document.getElementById('install-prompt').classList.remove('show');
        });
        
        // 앱이 설치되면 프롬프트 숨김
        window.addEventListener('appinstalled', () => {
            console.log('PWA installed');
            document.getElementById('install-prompt').classList.remove('show');
        });
        
        // 온라인/오프라인 상태 감지
        window.addEventListener('online', () => {
            document.getElementById('offline-indicator').classList.remove('show');
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-indicator').classList.add('show');
        });
        
        // iOS 사파리 홈 화면 추가 감지
        if (window.navigator.standalone === false) {
            // iOS에서 홈 화면에 추가되지 않음
            console.log('Not installed on iOS home screen');
        }
        
        // iframe 로드 완료 감지
        document.getElementById('streamlit-container').addEventListener('load', () => {
            console.log('Streamlit app loaded');
        });
    </script>
</body>
</html>
