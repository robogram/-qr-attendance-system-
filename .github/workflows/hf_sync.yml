name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git config --global user.email "antigravity-bot@robogram.co.kr"
          git config --global user.name "Antigravity Bot"
          git remote add hf https://hf_token:$HF_TOKEN@huggingface.co/spaces/robogram/robogram-attendance
          git push --force hf main
